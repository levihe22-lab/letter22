<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天数据打包工具</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .container {
        background: #fff;
        border-radius: 16px;
        padding: 36px 28px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.6; }
    .steps {
        text-align: left;
        background: #f9f9f9;
        border-radius: 10px;
        padding: 16px 20px;
        margin-bottom: 24px;
        font-size: 13px;
        line-height: 2;
    }
    .steps .num {
        display: inline-block;
        width: 20px;
        height: 20px;
        background: #07c160;
        color: #fff;
        border-radius: 50%;
        text-align: center;
        line-height: 20px;
        font-size: 11px;
        margin-right: 8px;
    }
    .folder-select {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
    }
    .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary {
        background: #07c160;
        color: #fff;
        font-weight: 500;
    }
    .btn-primary:hover { background: #06ad56; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
        background: #fff;
        color: #07c160;
        border: 2px solid #07c160;
    }
    .btn-outline:hover { background: #f0fff4; }
    .file-info {
        font-size: 13px;
        color: #666;
        padding: 8px 12px;
        background: #f0fff4;
        border-radius: 8px;
        display: none;
    }
    .file-info.show { display: block; }
    .progress-wrap { margin-top: 16px; display: none; }
    .progress-wrap.show { display: block; }
    progress {
        width: 100%;
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
        accent-color: #07c160;
    }
    .progress-text {
        font-size: 13px;
        color: #666;
        margin-top: 6px;
    }
    .status {
        margin-top: 12px;
        font-size: 14px;
        min-height: 20px;
    }
    .status.error { color: #e53e3e; }
    .status.success { color: #07c160; }
    .note {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #f0f0f0;
        font-size: 12px;
        color: #aaa;
        line-height: 1.6;
    }
</style>
</head>
<body>

<div class="container">
    <div class="icon">📦</div>
    <h1>聊天数据打包工具</h1>
    <p class="desc">将数据文件夹打包为 ZIP 文件，<br>传输到手机后即可在聊天查看器中导入。</p>

    <div class="steps">
        <div><span class="num">1</span> 选择你的 <strong>data/</strong> 文件夹</div>
        <div><span class="num">2</span> 可选：加入头像图片（avatar_me.jpg, avatar_even.jpg）</div>
        <div><span class="num">3</span> 点击「打包下载」，获得 ZIP 文件</div>
        <div><span class="num">4</span> 将 ZIP 传输到手机，在查看器页面导入</div>
    </div>

    <div class="folder-select">
        <input type="file" id="folderInput" webkitdirectory multiple style="display:none">
        <button class="btn btn-outline" id="btnSelect" type="button">📁 选择数据文件夹</button>
        <div class="file-info" id="fileInfo"></div>
        <button class="btn btn-primary" id="btnPackage" type="button" disabled>📦 打包下载</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <progress id="progressBar" max="100" value="0"></progress>
        <div class="progress-text" id="progressText"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="note">
        ⚠️ 数据仅在您的浏览器中处理，不会上传到任何服务器。<br>
        打包的 ZIP 文件包含您的聊天记录，请妥善保管。
    </div>
</div>

<script>
const btnSelect = document.getElementById('btnSelect');
const btnPackage = document.getElementById('btnPackage');
const folderInput = document.getElementById('folderInput');
const fileInfo = document.getElementById('fileInfo');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const status = document.getElementById('status');

let selectedFiles = [];

btnSelect.addEventListener('click', () => folderInput.click());

folderInput.addEventListener('change', () => {
    selectedFiles = Array.from(folderInput.files);
    if (selectedFiles.length === 0) {
        fileInfo.classList.remove('show');
        btnPackage.disabled = true;
        return;
    }

    // Count by type
    let jsonCount = 0, imgCount = 0, otherCount = 0;
    let totalSize = 0;
    selectedFiles.forEach(f => {
        totalSize += f.size;
        const name = f.name.toLowerCase();
        if (name.endsWith('.json')) jsonCount++;
        else if (name.match(/\.(jpg|jpeg|png|webp|gif)$/)) imgCount++;
        else otherCount++;
    });

    const sizeMB = (totalSize / 1024 / 1024).toFixed(1);
    fileInfo.innerHTML = `已选择 <strong>${selectedFiles.length}</strong> 个文件（${sizeMB} MB）<br>
        JSON: ${jsonCount} | 图片: ${imgCount} | 其他: ${otherCount}`;
    fileInfo.classList.add('show');
    btnPackage.disabled = false;
    status.textContent = '';
});

btnPackage.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;

    btnPackage.disabled = true;
    btnSelect.disabled = true;
    progressWrap.classList.add('show');
    status.textContent = '';
    status.className = 'status';

    try {
        const zip = new JSZip();
        const total = selectedFiles.length;

        for (let i = 0; i < total; i++) {
            const file = selectedFiles[i];
            // Preserve relative path structure
            let path = file.webkitRelativePath || file.name;
            // Strip leading folder name if it's a wrapper
            // e.g. "letter22-data/data/contacts.json" → "data/contacts.json"
            const parts = path.split('/');
            if (parts.length > 2 && parts[1] === 'data') {
                path = parts.slice(1).join('/');
            }

            zip.file(path, file);

            const pct = Math.round((i + 1) / total * 100);
            progressBar.value = pct;
            progressText.textContent = `正在打包 ${i + 1}/${total}...`;

            // Yield to UI thread periodically
            if (i % 50 === 0) await new Promise(r => setTimeout(r, 0));
        }

        progressText.textContent = '正在生成 ZIP 文件...';
        const blob = await zip.generateAsync({
            type: 'blob',
            compression: 'DEFLATE',
            compressionOptions: { level: 6 }
        }, (meta) => {
            progressBar.value = meta.percent;
            progressText.textContent = `正在压缩... ${meta.percent.toFixed(0)}%`;
        });

        // Trigger download
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'wechat-data.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        const sizeMB = (blob.size / 1024 / 1024).toFixed(1);
        status.textContent = `✅ 打包完成！文件大小: ${sizeMB} MB，已开始下载。`;
        status.className = 'status success';
    } catch (err) {
        status.textContent = '❌ 打包失败: ' + (err.message || '未知错误');
        status.className = 'status error';
    } finally {
        btnPackage.disabled = false;
        btnSelect.disabled = false;
        progressWrap.classList.remove('show');
    }
});
</script>
</body>
</html>
