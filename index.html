<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="聊天记录">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#07c160">
    <link rel="icon" href="data:,">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <title>微信聊天记录查看器</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="app">
    <!-- 顶部栏 -->
    <div id="topbar">
        <span id="topbar-name">聊天记录</span>
        <div id="topbar-spacer"></div>
        <button id="btn-menu" title="菜单">⋮</button>
    </div>

    <!-- 二级菜单 -->
    <div id="menu-dropdown" style="display:none">
        <div class="menu-item" id="menu-date">📅 日期跳转</div>
        <div class="menu-item" id="menu-search">🔍 搜索记录</div>
    </div>

    <!-- 搜索栏 -->
    <div id="search-bar">
        <input type="text" id="search-input" placeholder="🔍 搜索聊天记录..." autocomplete="off">
        <button id="btn-search-clear" style="display:none">✕</button>
        <button id="btn-search-close" style="display:none">✕</button>
    </div>

    <!-- 搜索状态 -->
    <div id="search-status"></div>

    <!-- 消息区域 -->
    <div id="chat-area">
        <div id="messages-container">
            <div id="load-more" style="display:none">
                <button id="btn-load-more">加载更多...</button>
            </div>
            <div id="messages-list"></div>
        </div>
        <div id="empty-hint">👈 选择一个联系人开始浏览聊天记录</div>
    </div>
</div>

<!-- 搜索结果面板 -->
<div id="search-panel" style="display:none">
    <div id="search-dialog">
        <div id="search-dialog-header">
            <span id="search-result-title">搜索结果</span>
            <button id="search-panel-close">✕</button>
        </div>
        <div id="search-list"></div>
    </div>
</div>

<!-- 日期跳转面板 -->
<div id="date-panel" style="display:none">
    <div id="date-dialog">
        <div id="date-header-row">
            <button id="date-prev-month">◀</button>
            <span id="date-year-month"></span>
            <button id="date-next-month">▶</button>
        </div>
        <div id="date-weekday-row">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div id="date-grid"></div>
        <div id="date-footer">
            <button id="date-close-btn">关闭</button>
            <button id="date-jump-latest">跳到最新</button>
        </div>
    </div>
</div>

<!-- 图片预览 -->
<div id="image-overlay" style="display:none">
    <span id="image-close">✕</span>
    <img id="image-preview" src="" alt="预览">
</div>

<!-- 视频预览 -->
<div id="video-overlay" style="display:none">
    <span id="video-close">✕</span>
    <video id="video-preview" controls playsinline></video>
</div>

<!-- JSZip CDN (for ZIP import) -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- Data import modules (must load before app.js) -->
<script src="/direct-import.js?v=2"></script>
<script src="/vault.js?v=4"></script>

<!-- App -->
<script src="/app.js?v=6"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
    }).finally(function() {
        navigator.serviceWorker.register('/sw.js?v=8').then(function(reg) {
            console.log('SW v8 OK:', reg.scope);
        }).catch(function(err) {
            console.log('SW reg fail:', err);
        });
    });
}
</script>
</body>
</html>
