<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>微信聊天记录查看器</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>

<!-- 导入界面 -->
<div id="import-overlay">
    <div id="import-dialog">
        <div class="import-icon">💬</div>
        <h1>聊天记录查看器</h1>
        <p>导入你的聊天数据包，数据仅保存在本机浏览器中，<br>不会上传到任何服务器。</p>

        <div id="import-dropzone">
            <div class="dz-icon">📦</div>
            <div class="dz-text">点击选择 ZIP 数据包<br>或拖拽文件到此处</div>
        </div>

        <button id="btn-select-zip" class="btn-import">📦 选择 ZIP 文件</button>
        <input type="file" id="file-zip" accept=".zip,application/zip" style="display:none">

        <div class="import-or">— 或者 —</div>
        <button id="btn-select-folder" class="btn-import outline">📁 选择数据文件夹</button>
        <input type="file" id="file-folder" webkitdirectory multiple style="display:none">

        <progress id="import-progress" max="100" value="0"></progress>
        <div id="import-progress-text"></div>
        <div id="import-status"></div>
    </div>
</div>

<!-- App -->
<div id="app" style="display:none">
    <div id="topbar">
        <button id="btn-back" title="返回" style="display:none" onclick="backToSearch()">←</button>
        <span id="topbar-name">聊天记录</span>
        <div id="topbar-spacer"></div>
        <button id="btn-menu" title="菜单">⋮</button>
    </div>

    <div id="menu-dropdown" style="display:none">
        <div class="menu-item" id="menu-date">📅 日期跳转</div>
        <div class="menu-item" id="menu-search">🔍 搜索记录</div>
    </div>

    <div id="search-bar" style="display:none">
        <input type="text" id="search-input" placeholder="🔍 搜索聊天记录..." autocomplete="off">
        <button id="btn-search-clear" style="display:none">✕</button>
        <button id="btn-search-close" style="display:none">✕</button>
    </div>

    <div id="search-status"></div>

    <div id="chat-area">
        <div id="messages-container">
            <div id="load-more" style="display:none">
                <button id="btn-load-more">加载更多...</button>
            </div>
            <div id="messages-list"></div>
        </div>
        <div id="empty-hint">👈 选择一个联系人开始浏览聊天记录</div>
    </div>
</div>

<!-- 搜索结果面板 — WeChat 风格全屏搜索 -->
<div id="search-panel" style="display:none">
    <div id="search-dialog">
        <div id="search-dialog-header">
            <input type="text" id="search-panel-input" placeholder="搜索聊天记录" autocomplete="off">
            <button id="search-panel-cancel">取消</button>
        </div>
        <div id="search-result-title"></div>
        <div id="search-list"></div>
    </div>
</div>

<!-- 日期跳转面板 -->
<div id="date-panel" style="display:none">
    <div id="date-dialog">
        <div id="date-header-row">
            <button id="date-prev-month">◀</button>
            <span id="date-year-month"></span>
            <button id="date-next-month">▶</button>
        </div>
        <div id="date-weekday-row">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div id="date-grid"></div>
        <div id="date-footer">
            <button id="date-close-btn">关闭</button>
            <button id="date-jump-latest">跳到最新</button>
        </div>
    </div>
</div>

<!-- 图片预览 -->
<div id="image-overlay" style="display:none">
    <span id="image-close">✕</span>
    <img id="image-preview" src="" alt="预览">
</div>

<!-- 视频预览 -->
<div id="video-overlay" style="display:none">
    <span id="video-close">✕</span>
    <video id="video-preview" controls playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
    onerror="document.getElementById('import-status').textContent='⚠️ 网络连接失败，请检查网络后刷新页面'"></script>

<script src="import.js?v=2"></script>
<script src="app.js?v=8"></script>
</body>
</html>
